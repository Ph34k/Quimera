version: '3.8'

services:
  api:
    build: .
    container_name: quimera_api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - db
      - redis
      - elasticsearch
    networks:
      - quimera_net
    volumes:
      - .:/app

  db:
    image: postgres:15-alpine
    container_name: quimera_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quimera_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quimera_password}
      POSTGRES_DB: ${POSTGRES_DB:-quimera_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - quimera_net

  redis:
    image: redis:7-alpine
    container_name: quimera_redis
    ports:
      - "6379:6379"
    networks:
      - quimera_net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: quimera_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - quimera_net
    volumes:
      - esdata:/usr/share/elasticsearch/data

networks:
  quimera_net:
    driver: bridge

volumes:
  pgdata:
  esdata:
